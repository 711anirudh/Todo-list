<!DOCTYPE html>
<html lang="en">
<head>

    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>To Do List</h1>

        <div class="input-section">

        </div>

        <div class="Modify_task">

            <button class="del">Delete</button>
        </div>

        <div class="Modify_task">
            <h5>Task 2</h5>
            <button class="com">Completed</button>
            <button class="del">Delete</button>
        </div>

        <div class="Modify_task">
            <h5>Task 3</h5>
            <button class="com">Completed</button>
            <button class="del">Delete</button>
        </div>

    </div>

</body>
</html>
