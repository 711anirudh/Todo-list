<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Journal</title>

    <link rel="stylesheet" href="journal.css">
</head>

<body>

    <div class="container">

        <h1>My Journal</h1>

        <div class="color-section">
            <label for="bgColor">Choose Background:</label>
            <input type="color" id="bgColor" value="#f5f5dc">
        </div>

        <textarea id="journalText" placeholder="Write your thoughts here..." rows="15"></textarea>

        <div class="buttons">

            <button id="saveBtn">
                Save Journal
            </button>

            <button id="backBtn">
                ← Back to To-Do
            </button>
            <button id="clearBtn">
                Clear Journal
            </button>

        </div>

    </div>

    <script src="journal.js"></script>

</body>

</html>
